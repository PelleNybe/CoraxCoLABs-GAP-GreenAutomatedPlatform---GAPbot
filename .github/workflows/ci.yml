name: Mission Control CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
    - uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 10

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'
        cache-dependency-path: 'mission-control/pnpm-lock.yaml'

    - name: Install dependencies
      working-directory: ./mission-control
      run: pnpm install

    - name: Run linting
      working-directory: ./mission-control
      run: pnpm run lint

    - name: Build project
      working-directory: ./mission-control
      run: pnpm run build
